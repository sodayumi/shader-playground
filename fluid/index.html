<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluid</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <nav id="nav">
      <a href="/" class="back">Home</a>
      <span class="title">Fluid</span>
    </nav>
    <button id="record-btn" title="Record video (R)"></button>
    <div id="controls">
      <button data-effect="navier-stokes" class="active"><span class="key">1</span> Navier-Stokes</button>
      <button data-effect="poolwater"><span class="key">2</span> Pool Water</button>
    </div>
    <div id="sliders">
      <label class="slider-navier-stokes">
        <span>Viscosity</span>
        <input type="range" id="viscosity" min="0.1" max="3.0" step="0.1" value="1.2">
      </label>
      <label class="slider-navier-stokes">
        <span>Force</span>
        <input type="range" id="force" min="0.2" max="3.0" step="0.1" value="1.0">
      </label>
      <label class="slider-poolwater">
        <span>Speed</span>
        <input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.5">
      </label>
      <label class="slider-poolwater">
        <span>Detail</span>
        <input type="range" id="density" min="0.5" max="3" step="0.1" value="1">
      </label>
      <label class="slider-poolwater">
        <span>Scale</span>
        <input type="range" id="harmonics" min="0.2" max="2" step="0.1" value="1">
      </label>
    </div>
    <div id="upload-panel">
      <div id="drop-zone">Drop image/video or click</div>
      <input type="file" id="file-input" accept="image/*,video/*" hidden>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="text" id="url-input" placeholder="Or paste image/video URL..." style="flex:1; padding:8px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; font-size:12px;" />
        <button id="load-url" style="padding:8px 16px; border:1px solid rgba(255,255,255,0.3); border-radius:8px; background:rgba(0,0,0,0.7); color:white; cursor:pointer;">Load</button>
      </div>
    </div>
    <div id="loading" class="hidden">Loading...</div>
    <script type="module" src="/src/fluid.js"></script>
  </body>
</html>
